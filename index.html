<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man</title>
    <link rel="stylesheet" href="pacman.css">
    <script src="pacman.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <canvas id="board"></canvas>

    <div class="mobile-controls">
    <div class="control-btn" style="grid-area: up;" id="btn-up">▲</div>
    <div class="control-btn" style="grid-area: left;" id="btn-left">◀</div>
    <div class="control-btn" style="grid-area: right;" id="btn-right">▶</div>
    <div class="control-btn" style="grid-area: down;" id="btn-down">▼</div>
</div>

    <div id="game-over-overlay">
        <div class="popup-content">
            <h1>GAME OVER</h1>
            <p id="final-score-display">Score: 0</p>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>
    <div id="life-lost-notifier">
    <span id="life-text">LIFE LOST!</span>
    <div id="lives-remaining">Remaining: 3</div>
</div>
</body>
</html>
